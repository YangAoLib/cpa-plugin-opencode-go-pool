name: Release

on:
  push:
    tags:
      - "v[0-9]*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve release version
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ ! "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Unsupported release tag: ${GITHUB_REF_NAME}" >&2
            exit 1
          fi
          echo "VERSION=${VERSION}" >> "${GITHUB_ENV}"
          echo "ARCHIVE_LINUX=opencode-go-pool_${VERSION}_linux_amd64.zip" >> "${GITHUB_ENV}"
          echo "ARCHIVE_WINDOWS=opencode-go-pool_${VERSION}_windows_amd64.zip" >> "${GITHUB_ENV}"

      - name: Test
        run: make test

      - name: Build and package Linux amd64 plugin
        run: make package VERSION="${VERSION}"

      - name: Verify Linux installer artifacts
        run: |
          set -euo pipefail
          cd dist
          sha256sum --check checksums.txt
          test "$(unzip -Z1 "${ARCHIVE_LINUX}")" = "opencode-go-pool.so"

      - name: Install MinGW-w64 cross-compiler for Windows target
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcc-mingw-w64-x86-64

      - name: Build and package Windows amd64 plugin
        env:
          CC: x86_64-w64-mingw32-gcc
        run: make package-windows VERSION="${VERSION}"

      - name: Verify Windows installer artifacts
        run: |
          set -euo pipefail
          cd dist
          sha256sum --check checksums-windows.txt
          test "$(unzip -Z1 "${ARCHIVE_WINDOWS}")" = "opencode-go-pool.dll"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" \
              "dist/${ARCHIVE_LINUX}" dist/checksums.txt \
              "dist/${ARCHIVE_WINDOWS}" dist/checksums-windows.txt --clobber
          else
            gh release create "${GITHUB_REF_NAME}" \
              "dist/${ARCHIVE_LINUX}" dist/checksums.txt \
              "dist/${ARCHIVE_WINDOWS}" dist/checksums-windows.txt \
              --verify-tag \
              --title "${GITHUB_REF_NAME}" \
              --generate-notes
          fi

